<div class="app-container">
  <header class="app-header">
    <h1>Agent IA Echecs - FFE</h1>
    <p>Apprentissage des ouvertures aux échecs</p>
  </header>

  <main class="app-main">
    <div class="left-panel">
      <app-chessboard (moveChange)="onFenChange($event)"></app-chessboard>
    </div>

    <div class="right-panel">
      <div class="agent-panel" *ngIf="loadingAgent || agentAnalysis">
        <h3>Coach IA</h3>
        <div *ngIf="loadingAgent" class="loading">Analyse en cours...</div>
        <div *ngIf="agentAnalysis && !loadingAgent" class="agent-response">
          <div class="agent-text" [innerText]="agentAnalysis.response"></div>
          <div class="agent-meta">
            <span class="tools-badge" *ngFor="let tool of agentAnalysis.tools_used">{{ tool }}</span>
          </div>
        </div>
      </div>

      <app-recommendations
        [moves]="moves"
        [evaluation]="evaluation"
        [searchResults]="searchResults"
        [openingName]="openingName"
        [loadingMoves]="loadingMoves"
        [loadingEval]="loadingEval"
        [loadingSearch]="loadingSearch"
        [error]="error"
      ></app-recommendations>

      <app-video-panel
        [videos]="videos"
        [loading]="loadingVideos"
        [openingName]="openingName"
      ></app-video-panel>
    </div>
  </main>
</div>
